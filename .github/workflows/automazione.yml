name: Genera Articoli WP

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  elaborazione:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Installazione Librerie
      run: pip install -r requirements.txt
    
    - name: Esecuzione Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python content_generator.py
    
    - name: Salvataggio Risultati
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Assistente Bot"
        git add output/
        git diff --quiet && git diff --staged --quiet || git commit -m "📝 Articolo generato"
        git pull --rebase origin main
        git push
