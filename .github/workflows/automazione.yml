name: Genera Articoli WP

on:
  push:
    paths:
      - 'input/**' # Si attiva quando carichi qualcosa qui
  workflow_dispatch: # Permette di avviarlo anche manualmente

# PERMESSI FONDAMENTALI: Permettono al bot di salvare i file creati
permissions:
  contents: write

jobs:
  elaborazione:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le librerie
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Elabora i file con Gemini
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python content_generator.py

    - name: Salva il nuovo articolo nel repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Assistente Editoriale Bot"
        git add output/
        # Salva solo se c'è un file nuovo
        git diff --quiet && git diff --staged --quiet || git commit -m "📝 Nuovo articolo generato"
        git push
